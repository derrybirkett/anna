name: Council Builder Agent

on:
  schedule:
    - cron: "0 11 * * 0"  # Weekly Sunday at 11am UTC (1 hour after Product Review)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install council as sibling
        run: |
          git clone https://github.com/anomalyco/council.git ../council

      - name: Run Builder
        run: npx tsx agents/builder-runner.ts
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}