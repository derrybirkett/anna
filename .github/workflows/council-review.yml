name: Council Product Review

on:
  schedule:
    - cron: "0 10 * * 0"  # Weekly Sunday at 10am UTC
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install council as sibling
        run: |
          git clone https://github.com/anomalyco/council.git ../council

      - name: Run Product Review
        run: npx tsx agents/runner.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}